name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'coach/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'coach/**'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff
        pip install -r coach/requirements.txt

    - name: Ruff check
      run: ruff check coach/tools/

    - name: Import check
      run: |
        python -c "
        import sys
        sys.path.insert(0, 'coach/tools')
        import seo_audit, mcp_server, insight_ledger, evolve_skill, recap
        import session_hooks, deep_research
        print('All imports OK')
        "
