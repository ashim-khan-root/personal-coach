{{ define "main" }}
<section class="page-header" style="padding:80px 0 60px;">
  <div class="container">
    <h1>{{ .Title }}</h1>
    <div class="blog-meta">
      <time>{{ .Date.Format "January 2, 2006" }}</time>
      {{ with .Params.tags }}
      <span>Tags: {{ delimit . ", " }}</span>
      {{ end }}
    </div>
  </div>
</section>

<section class="page-content">
  <div class="container">
    <article class="blog-article">
      {{ .Content }}
    </article>

    {{ with .Params.tags }}
    <div class="post-tags">
      {{ range . }}
      <a href="{{ "/blog/" | relURL }}?tag={{ . | urlize }}" class="post-tag">#{{ . }}</a>
      {{ end }}
    </div>
    {{ end }}

    <div class="text-center" style="margin-top:48px;padding-top:32px;border-top:1px solid var(--light-gray);">
      <p style="margin-bottom:16px;color:var(--text-light);">Interested in our security solutions?</p>
      <a href="{{ "contact/" | relURL }}" class="btn btn-primary">Get in Touch</a>
      <a href="{{ "blog/" | relURL }}" class="btn btn-outline" style="margin-left:12px;">Back to Blog</a>
    </div>
  </div>
</section>
{{ end }}
